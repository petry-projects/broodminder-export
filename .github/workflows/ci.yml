# ─────────────────────────────────────────────────────────────────────────────
# SOURCE OF TRUTH: petry-projects/.github/standards/workflows/ci.yml
# Standard:        petry-projects/.github/standards/ci-standards.md#1-ci-pipeline-ciyml
#
# Customized for this repo's stack: Python (compile + pytest). The required
# status check job name `build-and-test` is preserved.
#
# CONVENTIONS (enforced by the standard):
#   • permissions: {} at top, least-privilege per job (CI needs contents: read)
#   • triggers: push + pull_request to main
#   • concurrency keyed by ref+sha so a new push cancels the stale run
#   • SHA-pin every third-party action (never a tag/branch)
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile sources
        run: python -m compileall bm scripts
      - name: Run tests
        # Live contract tests skip automatically without BROODMINDER_API_KEY,
        # so CI validates collection + offline paths and stays green.
        run: python -m pytest -q
